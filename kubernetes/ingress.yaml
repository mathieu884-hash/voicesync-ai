apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voicesync-ingress
  namespace: voicesync
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.voicesync.app
    - analytics.voicesync.app
    secretName: voicesync-tls
  rules:
  - host: api.voicesync.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000
  - host: analytics.voicesync.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 9090
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: voicesync-cert
  namespace: voicesync
spec:
  secretName: voicesync-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.voicesync.app
  - analytics.voicesync.app
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@voicesync.app
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
