version: '3.8'

services:
  backend:
    image: voicesync-ai/backend:latest
    restart: always
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    ports:
      - "8000:8000"

  frontend:
    image: voicesync-ai/frontend:latest
    restart: always
    ports:
      - "3000:3000"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
