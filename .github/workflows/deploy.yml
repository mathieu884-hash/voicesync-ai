name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Build and Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    permissions:
      packages: write
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements-prod.txt

    - name: Validate backend production dependencies
      run: |
        cd backend
        bash ./validate_dependencies.sh requirements-prod.txt
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: |
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      timeout-minutes: 40
      with:
        context: ./backend
        push: true
        tags: ghcr.io/${{ github.repository }}/voicesync-ai-backend:latest
        cache-from: type=gha,scope=backend
        cache-to: type=gha,mode=max,scope=backend
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      timeout-minutes: 20
      with:
        context: ./frontend
        push: true
        tags: ghcr.io/${{ github.repository }}/voicesync-ai-frontend:latest
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

  # Deploy to Kubernetes (if configured)
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
      continue-on-error: true
    
    - name: Deploy to cluster
      run: |
        kubectl set image deployment/voicesync-backend backend=ghcr.io/${{ github.repository }}/voicesync-ai-backend:latest -n production || true
        kubectl set image deployment/voicesync-frontend frontend=ghcr.io/${{ github.repository }}/voicesync-ai-frontend:latest -n production || true
        kubectl rollout status deployment/voicesync-backend -n production || true
      continue-on-error: true

  # Notify Slack
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "Deployment Status",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*VoiceSync AI - Deployment*\n*Status:* ${{ job.status }}\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                }
              }
            ]
          }
      continue-on-error: true
