version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://voicesync:voicesync@postgres:5432/voicesync
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - uploads:/app/uploads
      - temp:/app/temp
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - voicesync-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: voicesync
      POSTGRES_PASSWORD: voicesync
      POSTGRES_DB: voicesync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicesync"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voicesync-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voicesync-network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks worker -l info
    environment:
      - DATABASE_URL=postgresql://voicesync:voicesync@postgres:5432/voicesync
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - uploads:/app/uploads
      - temp:/app/temp
    networks:
      - voicesync-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks beat -l info
    environment:
      - DATABASE_URL=postgresql://voicesync:voicesync@postgres:5432/voicesync
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    networks:
      - voicesync-network

volumes:
  postgres_data:
  redis_data:
  uploads:
  temp:

networks:
  voicesync-network:
    driver: bridge
